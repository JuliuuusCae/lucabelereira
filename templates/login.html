<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lú Manicure — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-deco">◆</div>
      <h1 class="login-title">Lú Manicure</h1>
      <p class="login-sub">Área Administrativa</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for msg in messages %}
            <div class="flash-msg">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form action="/login" method="POST" class="login-form">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" placeholder="admin" required />
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary" style="width:100%; margin-top:8px;">Entrar</button>
      </form>

      <a href="/" class="login-back">← Voltar ao site</a>
    </div>
  </div>

</body>
</html>
